name: Build bottles

# Builds platform-specific Homebrew bottles for kane-cli, uploads them to a
# GitHub Release tagged `kane-cli-<version>`, and patches Formula/kane-cli.rb
# with a `bottle do` block. Once published, `brew install` downloads the
# prebuilt bottle on user machines instead of running `npm install` locally —
# so user toolchain (Xcode/CLT) version becomes irrelevant.
#
# Trigger model:
#   - `workflow_dispatch` only — manual trigger. After a new npm version
#     publishes and `Update Homebrew Formula` bumps the formula version,
#     a release manager dispatches this workflow with the new version
#     number to produce bottles.
#
# Why not `workflow_run` after Update Homebrew Formula:
#   The auto-trigger raced npm publish timing — bottles built within 2
#   minutes of `npm publish` hit npm's `--min-release-age` threshold and
#   produced silently-broken installs (kane-cli 0.2.9 incident). Manual
#   dispatch puts a human in the loop with timing buffer + the chance to
#   verify the npm tarball is healthy before spending CI cycles bottling
#   it. The integrity-check step below is a safety net; manual dispatch
#   is the real prevention.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Formula version to (re)build bottles for. Leave blank to use whatever's in Formula/kane-cli.rb on main."
        required: false
        type: string

permissions:
  contents: write

# Serialize bottle-publish runs so two overlapping invocations can't race
# each other on the formula commit / release upload. `cancel-in-progress:
# false` keeps any in-flight build going to completion (cancelling a build
# mid-`brew bottle` leaves partial state) — the next run queues behind it.
concurrency:
  group: build-bottles-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve version
        id: read
        # Build jobs always check out `main` and `brew bottle` produces
        # filenames + content based on `Formula/kane-cli.rb`'s version
        # field — NOT based on `inputs.version`. So any drift between
        # the input and the formula publishes wrongly-named bottles to
        # `kane-cli-${input}` (the release tag uses the input) while
        # the bottle filenames + content reflect the formula version.
        # The publish step's sha collector then can't find them
        # (filename glob mismatches), failing AFTER the release was
        # polluted with orphan assets.
        #
        # Guard against this: when user passes an explicit version,
        # require it match the formula version on main. For backfills
        # of older versions, the formula must first be reverted to
        # that version on main (or this workflow extended to take a
        # commit/tag input — out of scope today).
        run: |
          FORMULA_VERSION=$(grep '^  version' Formula/kane-cli.rb | awk -F'"' '{print $2}')
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            if [ "$VERSION" != "$FORMULA_VERSION" ]; then
              echo "❌ Refusing to bottle: inputs.version=${VERSION} but Formula/kane-cli.rb on main is ${FORMULA_VERSION}."
              echo "   Build jobs check out main and bottle whatever version the formula points at."
              echo "   To backfill an older version, first revert the formula on main to ${VERSION}."
              echo "   To bottle the current formula, leave the version input blank or pass ${FORMULA_VERSION}."
              exit 1
            fi
          else
            VERSION="$FORMULA_VERSION"
          fi

          # Sanity: if the formula has a `bottle do` block with a root_url
          # pointing at a different version, stop. That means update-formula
          # didn't strip the stale block (regex regression?), and proceeding
          # would publish bottles into a release whose URL the formula no
          # longer references after our patch step rewrites the block.
          # Belt-and-braces against the stale-bottle-block class of bug.
          #
          # Scoped to `root_url` lines only — matching `kane-cli-X.Y.Z`
          # anywhere in the formula would false-positive on the `url` line
          # (which always contains the npm tarball with the current version)
          # and on any comment that ever mentions an old version literal.
          STALE_ROOT=$(grep -E '^[[:space:]]*root_url[[:space:]]+"' Formula/kane-cli.rb \
            | grep -oE 'kane-cli-[0-9]+\.[0-9]+\.[0-9]+' \
            | grep -v "^kane-cli-${VERSION}$" | head -1 || true)
          if [ -n "$STALE_ROOT" ]; then
            echo "❌ Formula has a stale bottle block referencing ${STALE_ROOT} but version is ${VERSION}."
            echo "   update-formula.yml should strip the bottle block on every version bump."
            echo "   Refusing to proceed; investigate the stripping logic before re-running."
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building bottles for kane-cli ${VERSION}"

  build:
    needs: guard
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Each runner produces a bottle whose label is auto-detected from
        # the running OS (see "Determine bottle label" step). Adding a new
        # platform = adding one entry here, no other workflow changes.
        #
        # Coverage today:
        #   macos-14      → arm64_sonoma     (Apple Silicon, macOS 14)
        #                   Covers Sonoma + Sequoia + Tahoe via brew's
        #                   bottle-fallback (verified end-to-end on Tahoe).
        #   ubuntu-latest → x86_64_linux
        #
        # Not in matrix:
        #   macos-15 / macos-latest — reproducibly produces gzip-CRC-corrupt
        #     bottles when bottling kane-cli (homebrew-kane#12 + #13). brew
        #     extraction bails mid-stream on user machines. macos-latest
        #     currently aliases macos-15 so it inherits the bug. macos-14
        #     bottle covers all newer arm64 macOS via fallback. Re-add once
        #     the Sequoia gzip corruption is root-caused.
        #   ventura — Intel x86_64. `macos-13` is GHA's last free Intel pool,
        #     deprecating, queues for hours. Intel users install fine via
        #     formula's `def install` source-build path (npm install runs
        #     locally on first install). The async build-bottle-intel.yml
        #     workflow we tried previously never produced a working bottle
        #     across 7 dispatches — deleted.
        #   arm64_linux — `@testmuai/kane-cli-linux-arm64` does not exist
        #     on npm, so there's no platform binary to bundle.
        os:
          - macos-14
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Determine bottle label
        id: label
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            LABEL="x86_64_linux"
          else
            ARCH=$(uname -m)
            MAJOR=$(sw_vers -productVersion | cut -d. -f1)
            case "$MAJOR" in
              13) NAME=ventura ;;
              14) NAME=sonoma ;;
              15) NAME=sequoia ;;
              16|26) NAME=tahoe ;;  # macOS 26 = Tahoe (in case Apple/brew renumber)
              *)  NAME="macos${MAJOR}" ;;
            esac
            if [ "$ARCH" = "arm64" ]; then
              LABEL="arm64_${NAME}"
            else
              LABEL="${NAME}"
            fi
          fi
          echo "label=${LABEL}" >> "$GITHUB_OUTPUT"
          echo "Bottle label for this runner: ${LABEL}"

      - name: Tap self into Homebrew
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/lambdatest/homebrew-kane"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -snf "$GITHUB_WORKSPACE" "$TAP_DIR"
          brew tap | grep lambdatest/kane

      # Pre-install node so `brew install --build-bottle` doesn't have to
      # resolve the dep from a freshly-tapped homebrew/core. Without this,
      # the Linux runner failed with "No available formula with the name
      # 'node'" even though node was clearly tapped — a known race between
      # `setup-homebrew` and tap indexing under HOMEBREW_NO_INSTALL_FROM_API.
      - name: Pre-install node dependency
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install node

      - name: Build bottle
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          VERSION="${{ needs.guard.outputs.version }}"
          ROOT_URL="https://github.com/LambdaTest/homebrew-kane/releases/download/kane-cli-${VERSION}"

          brew install --build-bottle lambdatest/kane/kane-cli
          brew bottle \
            --no-rebuild \
            --json \
            --root-url="${ROOT_URL}" \
            lambdatest/kane/kane-cli

          # `brew bottle` emits filenames with `--` (e.g. kane-cli--0.2.7.arm64_sequoia.bottle.tar.gz);
          # Homebrew's URL convention is single-dash. Rename so the download URL matches.
          for f in kane-cli--*.bottle.*; do
            [ -e "$f" ] || continue
            mv "$f" "${f/--/-}"
          done

          ls -la kane-cli-*.bottle.* || true

      - name: Verify bottle integrity
        # Gate against silently-corrupt bottles before upload. macos-15
        # produced gzip-CRC-corrupt bottles for kane-cli 0.2.9 across
        # multiple builds (homebrew-kane#12) — file existed at the right
        # size, build "succeeded", upload completed, but `gzip -t` failed
        # and brew extraction bailed on user machines. This step would
        # have caught it. Two checks:
        #   1. `gzip -t` — verifies the gzip stream itself
        #   2. `tar -tzf` — verifies tar can list contents end-to-end
        #      (catches truncation where gzip is fine but tar payload is
        #      cut short)
        run: |
          set -e
          for bottle in kane-cli-*.bottle.tar.gz; do
            [ -e "$bottle" ] || continue
            if ! gzip -t "$bottle" 2>&1; then
              echo "❌ $bottle failed gzip integrity check"
              exit 1
            fi
            if ! tar -tzf "$bottle" >/dev/null 2>&1; then
              echo "❌ $bottle: gzip OK but tar listing failed"
              exit 1
            fi
            echo "✅ $bottle: gzip + tar listing OK"
          done

      - name: Upload bottle artifact
        uses: actions/upload-artifact@v4
        with:
          # Use runner os (not detected label) so duplicate labels from
          # macos-latest aliasing onto an existing runner don't collide.
          name: bottle-${{ matrix.os }}
          path: |
            kane-cli-*.bottle.tar.gz
            kane-cli-*.bottle.json
          if-no-files-found: error

  publish:
    needs: [guard, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-verify formula version hasn't drifted since guard
        # The guard job ran at the start of the workflow and the build
        # matrix took ~5–10 min. If `Update Homebrew Formula` (or any
        # other release path) advanced `main` in that window, this
        # publish job is about to upload bottles built from the OLD
        # version into a release tagged for the OLD version, then patch
        # the formula's bottle block — which now points at a NEWER
        # version — with stale shas. Result: users on the new version
        # would download bottles that don't match the formula and brew
        # fails the checksum.
        #
        # Re-read formula version after this checkout. Abort if drift.
        # Concurrency group above also prevents the inverse race.
        run: |
          CURRENT=$(grep '^  version' Formula/kane-cli.rb | awk -F'"' '{print $2}')
          EXPECTED="${{ needs.guard.outputs.version }}"
          if [ "$CURRENT" != "$EXPECTED" ]; then
            echo "❌ Formula version drifted during build: guard saw ${EXPECTED}, main is now ${CURRENT}."
            echo "   Refusing to publish stale bottles + rewrite the formula's bottle block."
            echo "   Re-dispatch Build bottles with the correct version after main settles."
            exit 1
          fi
          echo "✅ Formula still at ${EXPECTED} — proceeding to publish"

      - name: Download all bottle artifacts
        uses: actions/download-artifact@v4
        with:
          path: bottles
          # When two runners produce bottles with the same label (e.g.
          # macos-latest aliasing macos-14 today), download-artifact's
          # merge keeps one — same-label bottles are interchangeable.
          merge-multiple: true

      - name: Inventory artifacts
        run: ls -la bottles/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.guard.outputs.version }}"
          TAG="kane-cli-${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists; uploading bottles with --clobber"
            gh release upload "$TAG" bottles/*.bottle.tar.gz --clobber
          else
            gh release create "$TAG" bottles/*.bottle.tar.gz \
              --title "$TAG" \
              --notes "Homebrew bottles for kane-cli ${VERSION}"
          fi

      - name: Compute sha256s and patch formula
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          python3 - <<'PY'
          import hashlib, glob, os, re, sys

          version = os.environ["VERSION"]

          # Discover labels from filenames so adding/removing matrix runners
          # doesn't require updating this script.
          shas = {}
          for f in sorted(glob.glob(f"bottles/kane-cli-{version}.*.bottle.tar.gz")):
              m = re.search(rf"kane-cli-{re.escape(version)}\.([^.]+)\.bottle\.tar\.gz$", f)
              if not m:
                  continue
              label = m.group(1)
              with open(f, "rb") as fp:
                  shas[label] = hashlib.sha256(fp.read()).hexdigest()

          if not shas:
              sys.exit("No bottle artifacts found — aborting")

          # Order: arm64 macOS newest→oldest, x86_64 macOS newest→oldest, then linux.
          # Unknown labels go at the end alphabetically.
          macos_rank = {"tahoe": 0, "sequoia": 1, "sonoma": 2, "ventura": 3, "monterey": 4}
          def sort_key(label):
              if label == "x86_64_linux":
                  return (3, 0, label)
              if label.startswith("arm64_"):
                  name = label[len("arm64_"):]
                  return (0, macos_rank.get(name, 99), label)
              return (1, macos_rank.get(label, 99), label)  # x86_64 macOS
          ordered = sorted(shas.keys(), key=sort_key)

          root_url = f"https://github.com/LambdaTest/homebrew-kane/releases/download/kane-cli-{version}"
          width = max(len(k) for k in ordered) + 1
          lines = [
              "  bottle do",
              f'    root_url "{root_url}"',
          ]
          for label in ordered:
              lines.append(
                  f'    sha256 cellar: :any_skip_relocation, {label}:{" " * (width - len(label))}"{shas[label]}"'
              )
          lines.append("  end")
          block = "\n".join(lines) + "\n"

          with open("Formula/kane-cli.rb") as f:
              src = f.read()

          # Drop any existing bottle block.
          src = re.sub(r"  bottle do\n(?:.*\n)*?  end\n+", "", src)

          # Insert immediately after the version line.
          src, n = re.subn(
              r'(  version "[^"]+"\n)\n*',
              r"\1\n" + block + "\n",
              src,
              count=1,
          )
          if n != 1:
              sys.exit("Could not locate version line for bottle block insertion")

          with open("Formula/kane-cli.rb", "w") as f:
              f.write(src)

          print("Patched formula:")
          print(src)
          PY

      - name: Commit bottle block
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kane-cli.rb
          if git diff --cached --quiet; then
            echo "No formula changes — bottle block already current."
            exit 0
          fi
          git commit -m "Add bottle block for kane-cli ${{ needs.guard.outputs.version }}"
          git push origin main

      - name: Trigger Validate brew install with explicit version
        # Chain validation via `gh workflow run` instead of `workflow_run`
        # so we carry the exact version we just published into validation.
        # Previously: validate-brew-install used workflow_run + read formula
        # version on main, which races with `Update Homebrew Formula` —
        # validation could end up testing whatever main now points at
        # instead of these bottles. Explicit dispatch eliminates the race.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.guard.outputs.version }}"
          gh workflow run "Validate brew install" \
            --ref main \
            -f expected-version="${VERSION}"
          echo "✅ Dispatched Validate brew install for kane-cli ${VERSION}"

name: Update Homebrew Formula

on:
  repository_dispatch:
    types: [formula-update]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update formula to (e.g. 0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  # Required for the final step that dispatches Build bottles via
  # `gh workflow run`. Default GITHUB_TOKEN scope only covers contents
  # in workflow context.
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for npm package availability
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG="@testmuai/kane-cli"
          echo "Waiting for ${PKG}@${VERSION} on npmjs.com..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://registry.npmjs.org/${PKG}/${VERSION}")
            if [ "$STATUS" = "200" ]; then
              echo "${PKG}@${VERSION} is available."
              exit 0
            fi
            echo "Poll ${i}/24 — HTTP ${STATUS}, sleeping 5s..."
            sleep 5
          done
          echo "ERROR: ${PKG}@${VERSION} not visible on npmjs.com after 2m"
          exit 1

      - name: Compute tarball sha256
        id: tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL_URL="https://registry.npmjs.org/@testmuai/kane-cli/-/kane-cli-${VERSION}.tgz"

          curl -fsSL "$TARBALL_URL" -o kane-cli.tgz
          SHA256=$(sha256sum kane-cli.tgz | awk '{print $1}')

          echo "tarball-url=${TARBALL_URL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "Tarball: ${TARBALL_URL}"
          echo "sha256:  ${SHA256}"

      - name: Update formula
        # Critical: ALSO strip the existing `bottle do ... end` block. The
        # block carries the previous release's `root_url` + per-arch shas;
        # leaving it in place during a version bump means brew tries to
        # download a non-existent file at the OLD release URL with the
        # NEW version filename — every install fails until Build bottles
        # is manually dispatched.
        #
        # Stripping the block makes brew fall back to source-build (which
        # works correctly via def install) during the gap between version
        # bump and bottle rebuild. When Build bottles runs, it re-inserts
        # a fresh block with correct shas.
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL_URL="${{ steps.tarball.outputs.tarball-url }}"
          SHA256="${{ steps.tarball.outputs.sha256 }}"
          FORMULA="Formula/kane-cli.rb"

          sed -i "s|^  url \".*\"|  url \"${TARBALL_URL}\"|" "$FORMULA"
          sed -i "s|^  sha256 \".*\"|  sha256 \"${SHA256}\"|" "$FORMULA"
          sed -i "s|^  version \".*\"|  version \"${VERSION}\"|" "$FORMULA"

          # Strip any existing `bottle do ... end` block — Python regex so
          # we handle multi-line blocks reliably (sed multi-line is fragile
          # across BSD/GNU). Same regex Build bottles uses for replacement.
          python3 - "$FORMULA" <<'PY'
          import re, sys
          path = sys.argv[1]
          with open(path) as f:
              src = f.read()
          new = re.sub(r"  bottle do\n(?:.*\n)*?  end\n+", "", src)
          if new != src:
              print("Stripped stale bottle block from formula")
          with open(path, "w") as f:
              f.write(new)
          PY

          echo "Updated formula to ${VERSION}:"
          cat "$FORMULA"

      - name: Commit and push
        id: commit
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kane-cli.rb
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update kane-cli to ${VERSION}"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      # Auto-chain Build bottles after the formula bump. Conditional on
      # an actual commit so re-runs that find no changes don't trigger
      # spurious bottle builds. The Wait-for-npm step earlier in this
      # workflow + ~30s of runtime here mean the npm tarball has been
      # available for ≥1 min before bottling starts; well past npm's
      # `--min-release-age` threshold that bit kane-cli 0.2.9.
      - name: Trigger Build bottles for the new version
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh workflow run "Build bottles" \
            --ref main \
            -f version="${VERSION}"
          echo "✅ Dispatched Build bottles for kane-cli ${VERSION}"
